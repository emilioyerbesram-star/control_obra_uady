<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel del Ingeniero</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background: #f4f4f4; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #2c3e50; color: white; }
        .form-add { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, button { padding: 10px; margin: 5px; }
        button { background: #27ae60; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>👷‍♂️ Panel de Control - Ing. Emilio</h1>
    
    <div class="form-add">
        <h3>Agregar Nuevo Material</h3>
        <form action="/agregar" method="post">
            <input type="text" name="nombre" placeholder="Nombre (Ej. Cemento)" required>
            <input type="number" name="cantidad" placeholder="Cantidad" required>
            <input type="text" name="unidad" placeholder="Unidad (Ej. Bultos)" required>
            <button type="submit">Agregar al Inventario</button>
        </form>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Material</th>
                <th>Stock Actual</th>
                <th>Unidad</th>
            </tr>
        </thead>
        <tbody>
            {% for m in materiales %}
            <tr>
                <td>{{ m[0] }}</td>
                <td>{{ m[1] }}</td>
                <td>{{ m[2] }}</td>
                <td>{{ m[3] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <br>
    <a href="/">Cerrar Sesión</a>
</body>
</html>
